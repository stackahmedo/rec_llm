<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RecLLM</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<style>
[x-cloak] { display: none !important; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
.fade-in { animation: fadeIn 0.2s ease-in; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.toast-enter { animation: slideIn 0.3s ease-out; }
.toast-leave { animation: slideOut 0.3s ease-in forwards; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes slideOut { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }
</style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen" x-data="app()" x-cloak
  @keydown.window="handleKeyboard($event)">

<!-- Sidebar -->
<div class="fixed inset-y-0 left-0 w-56 bg-white border-r border-gray-200 flex flex-col">
  <div class="p-4 border-b border-gray-100">
    <h1 class="text-lg font-bold text-gray-900">RecLLM</h1>
    <p class="text-xs text-gray-500">Audio Intelligence</p>
  </div>
  <nav class="flex-1 p-2 space-y-0.5">
    <template x-for="item in navItems" :key="item.id">
      <button
        @click="currentView = item.id"
        :class="currentView === item.id ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-50'"
        class="w-full text-left px-3 py-2 rounded-md text-sm font-medium transition-colors"
        x-text="item.label">
      </button>
    </template>
  </nav>
  <div class="p-3 border-t border-gray-100">
    <div class="flex items-center gap-2">
      <div class="w-2 h-2 rounded-full" :class="apiConnected ? 'bg-emerald-500' : 'bg-red-500'"></div>
      <span class="text-xs text-gray-500" x-text="apiConnected ? 'API接続済み' : 'API未接続'"></span>
    </div>
  </div>
</div>

<!-- Main Content -->
<div class="ml-56 min-h-screen">
  <!-- Header -->
  <header class="sticky top-0 z-10 bg-white/80 backdrop-blur border-b border-gray-200 px-6 py-3 flex items-center justify-between">
    <div>
      <h2 class="text-base font-semibold" x-text="navItems.find(n => n.id === currentView)?.label"></h2>
      <p class="text-xs text-gray-500" x-text="navItems.find(n => n.id === currentView)?.sub"></p>
    </div>
    <div class="flex items-center gap-3">
      <input type="text" placeholder="検索..." class="text-sm border border-gray-200 rounded-md px-3 py-1.5 w-48 focus:outline-none focus:ring-1 focus:ring-blue-500"
        x-model="searchQuery" @keyup.enter="doSearch()">
    </div>
  </header>

  <!-- Dashboard -->
  <div x-show="currentView === 'dashboard'" class="p-6 fade-in">
    <div class="grid grid-cols-4 gap-4 mb-6">
      <div class="bg-white rounded-lg border border-gray-200 p-4">
        <div class="text-xs text-gray-500 mb-1">処理済みファイル</div>
        <div class="text-2xl font-bold" x-text="stats.totalRecordings"></div>
      </div>
      <div class="bg-white rounded-lg border border-gray-200 p-4">
        <div class="text-xs text-gray-500 mb-1">合計時間</div>
        <div class="text-2xl font-bold" x-text="stats.totalHours + 'h'"></div>
      </div>
      <div class="bg-white rounded-lg border border-gray-200 p-4">
        <div class="text-xs text-gray-500 mb-1">発話数</div>
        <div class="text-2xl font-bold" x-text="stats.totalUtterances.toLocaleString()"></div>
      </div>
      <div class="bg-white rounded-lg border border-gray-200 p-4">
        <div class="text-xs text-gray-500 mb-1">話者数</div>
        <div class="text-2xl font-bold" x-text="stats.uniqueSpeakers"></div>
      </div>
    </div>

    <!-- Recent Jobs -->
    <div class="bg-white rounded-lg border border-gray-200 p-4">
      <h3 class="text-sm font-semibold mb-3">最近のジョブ</h3>
      <div x-show="recentJobs.length === 0" class="text-sm text-gray-400 py-4 text-center">
        ジョブはまだありません。音声をアップロードしてください。
      </div>
      <div class="space-y-2">
        <template x-for="job in recentJobs" :key="job.id">
          <div class="flex items-center justify-between py-2 border-b border-gray-50 last:border-0">
            <div class="flex items-center gap-3">
              <div class="w-2 h-2 rounded-full" :class="job.status === 'done' ? 'bg-emerald-500' : job.status === 'failed' ? 'bg-red-500' : 'bg-amber-500'"></div>
              <span class="text-sm" x-text="job.recording_id"></span>
            </div>
            <div class="flex items-center gap-2">
              <span class="text-xs px-2 py-0.5 rounded-full"
                :class="job.status === 'done' ? 'bg-emerald-50 text-emerald-700' : job.status === 'failed' ? 'bg-red-50 text-red-700' : 'bg-amber-50 text-amber-700'"
                x-text="job.status === 'done' ? '完了' : job.status === 'failed' ? '失敗' : '処理中'"></span>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- Upload -->
  <div x-show="currentView === 'upload'" class="p-6 fade-in">
    <div class="bg-white rounded-lg border border-gray-200 p-6">
      <div class="border-2 border-dashed border-gray-300 rounded-lg p-12 text-center hover:border-blue-400 transition-colors"
        @dragover.prevent="dragOver = true" @dragleave="dragOver = false" @drop.prevent="handleDrop($event)"
        :class="dragOver ? 'border-blue-400 bg-blue-50' : ''">
        <div class="text-gray-400 mb-2">
          <svg class="w-12 h-12 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
          </svg>
        </div>
        <p class="text-sm text-gray-600 mb-1">音声ファイルをドラッグ＆ドロップ</p>
        <p class="text-xs text-gray-400">WAV · MP3 · M4A · FLAC · OGG — 最大30時間</p>
        <button @click="selectFiles()" class="mt-4 px-4 py-2 bg-blue-600 text-white text-sm rounded-md hover:bg-blue-700 transition-colors">
          ファイルを選択
        </button>
      </div>

      <!-- Queue -->
      <div x-show="queue.length > 0" class="mt-6">
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-sm font-semibold">処理キュー (<span x-text="queue.length"></span>)</h3>
          <div class="flex gap-2">
            <button @click="startAll()" class="text-xs px-3 py-1 bg-emerald-600 text-white rounded hover:bg-emerald-700">すべて開始</button>
            <button @click="clearDone()" class="text-xs px-3 py-1 bg-gray-200 text-gray-700 rounded hover:bg-gray-300">完了を削除</button>
          </div>
        </div>
        <div class="space-y-1">
          <template x-for="item in queue" :key="item.id">
            <div class="flex items-center gap-3 py-2 px-3 bg-gray-50 rounded text-sm">
              <div class="w-2 h-2 rounded-full" :class="item.status === 'done' ? 'bg-emerald-500' : item.status === 'failed' ? 'bg-red-500' : item.status === 'running' ? 'bg-blue-500 animate-pulse' : 'bg-gray-300'"></div>
              <span class="flex-1 truncate" x-text="item.fileName"></span>
              <span class="text-xs text-gray-400" x-text="item.status === 'done' ? '完了' : item.status === 'failed' ? '失敗' : item.status === 'running' ? '処理中' : '待機中'"></span>
            </div>
          </template>
        </div>
      </div>
    </div>
  </div>

  <!-- Transcripts -->
  <div x-show="currentView === 'transcripts'" class="p-6 fade-in">
    <div class="bg-white rounded-lg border border-gray-200">
      <div class="p-4 border-b border-gray-100">
        <input type="text" placeholder="文字起こしを検索..." class="text-sm border border-gray-200 rounded-md px-3 py-1.5 w-full focus:outline-none focus:ring-1 focus:ring-blue-500"
          x-model="transcriptSearch">
      </div>
      <div x-show="recordings.length === 0" class="p-8 text-center text-sm text-gray-400">
        文字起こしはまだありません。
      </div>
      <div class="divide-y divide-gray-100">
        <template x-for="rec in filteredRecordings" :key="rec.id">
          <div class="px-4 py-3 hover:bg-gray-50 cursor-pointer transition-colors group" @click="viewTranscript(rec.id)">
            <div class="flex items-center justify-between">
              <div class="flex-1 min-w-0">
                <div class="text-sm font-medium truncate" x-text="rec.original_file_name || rec.id"></div>
                <div class="text-xs text-gray-400 mt-0.5">
                  <span x-text="rec.created_at?.slice(0, 10)"></span>
                  <span class="mx-1">·</span>
                  <span x-text="rec.language_code || 'auto'"></span>
                  <span x-show="rec.duration_seconds" class="mx-1">·</span>
                  <span x-show="rec.duration_seconds" x-text="formatDuration(rec.duration_seconds)"></span>
                  <span x-show="rec.speaker_count" class="mx-1">·</span>
                  <span x-show="rec.speaker_count" x-text="rec.speaker_count + ' 話者'"></span>
                </div>
              </div>
              <div class="flex items-center gap-2">
                <span class="text-xs px-2 py-0.5 rounded-full"
                  :class="rec.status === 'done' ? 'bg-emerald-50 text-emerald-700' : rec.status === 'failed' ? 'bg-red-50 text-red-700' : rec.status === 'processing' ? 'bg-blue-50 text-blue-700' : 'bg-gray-100 text-gray-600'"
                  x-text="rec.status === 'done' ? '完了' : rec.status === 'failed' ? '失敗' : rec.status === 'processing' ? '処理中' : '待機'"></span>
                <button @click.stop="deleteRecording(rec.id)" class="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-red-500 transition-all p-1" title="削除">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                </button>
              </div>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- Settings -->
  <div x-show="currentView === 'settings'" class="p-6 fade-in">
    <div class="max-w-2xl space-y-6">
      <!-- API Keys -->
      <div class="bg-white rounded-lg border border-gray-200 p-5">
        <h3 class="text-sm font-semibold mb-4">APIキー設定</h3>
        <div class="space-y-4">
          <div>
            <label class="text-xs text-gray-500 block mb-1">AssemblyAI</label>
            <input type="password" x-model="settings.assemblyaiKey" placeholder="APIキーを入力..."
              class="w-full text-sm border border-gray-200 rounded-md px-3 py-2 focus:outline-none focus:ring-1 focus:ring-blue-500">
          </div>
          <div>
            <label class="text-xs text-gray-500 block mb-1">Gemini</label>
            <input type="password" x-model="settings.geminiKey" placeholder="APIキーを入力..."
              class="w-full text-sm border border-gray-200 rounded-md px-3 py-2 focus:outline-none focus:ring-1 focus:ring-blue-500">
          </div>
          <div>
            <label class="text-xs text-gray-500 block mb-1">OpenAI</label>
            <input type="password" x-model="settings.openaiKey" placeholder="APIキーを入力..."
              class="w-full text-sm border border-gray-200 rounded-md px-3 py-2 focus:outline-none focus:ring-1 focus:ring-blue-500">
          </div>
          <button @click="saveSettings()" class="px-4 py-2 bg-blue-600 text-white text-sm rounded-md hover:bg-blue-700">
            設定を保存
          </button>
        </div>
      </div>

      <!-- Processing -->
      <div class="bg-white rounded-lg border border-gray-200 p-5">
        <h3 class="text-sm font-semibold mb-4">処理設定</h3>
        <div class="space-y-3">
          <label class="flex items-center gap-3">
            <input type="checkbox" x-model="settings.noiseReduction" class="rounded">
            <span class="text-sm">ノイズ除去を有効にする</span>
          </label>
          <label class="flex items-center gap-3">
            <input type="checkbox" x-model="settings.speakerDetection" class="rounded">
            <span class="text-sm">話者分離を有効にする</span>
          </label>
          <div>
            <label class="text-xs text-gray-500 block mb-1">デフォルト言語</label>
            <select x-model="settings.language" class="text-sm border border-gray-200 rounded-md px-3 py-2">
              <option value="auto">自動検出</option>
              <option value="ja">日本語</option>
              <option value="en">English</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Search Results -->
  <div x-show="currentView === 'search'" class="p-6 fade-in">
    <div class="bg-white rounded-lg border border-gray-200 p-4">
      <h3 class="text-sm font-semibold mb-3">検索結果: "<span x-text="searchQuery"></span>"</h3>
      <div x-show="searchResults.length === 0" class="text-sm text-gray-400 py-4 text-center">
        結果が見つかりません。
      </div>
      <div class="space-y-2">
        <template x-for="result in searchResults" :key="result.recording_id + result.matched_text">
          <div class="p-3 bg-gray-50 rounded cursor-pointer hover:bg-gray-100" @click="viewTranscript(result.recording_id)">
            <div class="text-xs text-gray-500" x-text="result.file_name"></div>
            <div class="text-sm mt-1" x-text="result.matched_text"></div>
            <div class="text-xs text-gray-400 mt-1" x-text="(result.speaker || '') + ' · ' + (result.date?.slice(0, 10) || '')"></div>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- Transcript Detail -->
  <div x-show="currentView === 'transcript-detail'" class="p-6 fade-in">
    <div class="mb-4 flex items-center justify-between">
      <button @click="currentView = 'transcripts'" class="text-sm text-blue-600 hover:text-blue-800">← 一覧に戻る</button>
      <div class="flex gap-2">
        <button @click="exportTranscript('txt')" class="text-xs px-3 py-1.5 bg-gray-100 text-gray-700 rounded hover:bg-gray-200">TXT出力</button>
        <button @click="exportTranscript('pdf')" class="text-xs px-3 py-1.5 bg-blue-600 text-white rounded hover:bg-blue-700">PDF出力</button>
      </div>
    </div>

    <div x-show="currentRecording" class="space-y-4">
      <!-- Recording Info -->
      <div class="bg-white rounded-lg border border-gray-200 p-4">
        <h3 class="text-sm font-semibold" x-text="currentRecording?.original_file_name"></h3>
        <div class="flex gap-4 mt-2 text-xs text-gray-500">
          <span x-text="currentRecording?.language_code || 'auto'"></span>
          <span x-text="currentRecording?.speaker_count + ' 話者'"></span>
          <span x-text="formatDuration(currentRecording?.duration_seconds)"></span>
          <span x-text="currentRecording?.status === 'done' ? '完了' : currentRecording?.status"></span>
        </div>
      </div>

      <!-- Utterances -->
      <div class="bg-white rounded-lg border border-gray-200 divide-y divide-gray-50">
        <template x-for="utt in currentUtterances" :key="utt.id">
          <div class="px-4 py-2 hover:bg-gray-50 group">
            <div class="flex items-start gap-3">
              <span class="text-[10px] text-gray-400 font-mono mt-0.5 min-w-[52px]" x-text="msToTime(utt.start_ms)"></span>
              <div class="flex-1">
                <span class="text-xs font-semibold text-gray-600" x-text="utt.speaker + ':'"></span>
                <span class="text-sm text-gray-800 ml-1" x-text="utt.corrected_text || utt.text"></span>
              </div>
              <span class="text-[9px] px-1.5 py-0.5 rounded-full opacity-0 group-hover:opacity-100 transition-opacity"
                :class="utt.speed_label === 'fast' ? 'bg-red-50 text-red-600' : utt.speed_label === 'slow' ? 'bg-blue-50 text-blue-600' : 'bg-gray-50 text-gray-500'"
                x-text="utt.wpm ? utt.wpm + ' WPM' : ''"></span>
            </div>
          </div>
        </template>
        <div x-show="currentUtterances.length === 0" class="p-8 text-center text-sm text-gray-400">
          文字起こしデータがありません。
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Toast Notifications -->
<div class="fixed top-4 right-4 z-50 space-y-2" x-show="toasts.length > 0">
  <template x-for="toast in toasts" :key="toast.id">
    <div class="toast-enter flex items-center gap-3 px-4 py-3 rounded-lg shadow-lg text-sm max-w-sm"
      :class="toast.type === 'success' ? 'bg-emerald-600 text-white' : toast.type === 'error' ? 'bg-red-600 text-white' : 'bg-gray-800 text-white'">
      <span x-text="toast.message" class="flex-1"></span>
      <button @click="removeToast(toast.id)" class="text-white/70 hover:text-white">✕</button>
    </div>
  </template>
</div>

<script>
function app() {
  return {
    currentView: 'dashboard',
    searchQuery: '',
    transcriptSearch: '',
    dragOver: false,
    apiConnected: false,
    stats: { totalRecordings: 0, totalHours: 0, totalUtterances: 0, uniqueSpeakers: 0 },
    recentJobs: [],
    recordings: [],
    queue: [],
    searchResults: [],
    currentRecording: null,
    currentUtterances: [],
    toasts: [],
    settings: {
      assemblyaiKey: '',
      geminiKey: '',
      openaiKey: '',
      noiseReduction: false,
      speakerDetection: true,
      language: 'auto',
    },
    navItems: [
      { id: 'dashboard', label: 'ダッシュボード', sub: '録音・処理・AI学習の概要' },
      { id: 'upload', label: 'アップロード', sub: '音声ファイルの一括処理' },
      { id: 'transcripts', label: '文字起こし', sub: '文字起こし結果の確認・編集' },
      { id: 'search', label: '検索', sub: 'アーカイブ全文検索' },
      { id: 'settings', label: '設定', sub: 'API・処理設定' },
    ],

    get filteredRecordings() {
      if (!this.transcriptSearch) return this.recordings;
      const q = this.transcriptSearch.toLowerCase();
      return this.recordings.filter(r =>
        (r.original_file_name || '').toLowerCase().includes(q) ||
        (r.language_code || '').toLowerCase().includes(q)
      );
    },

    async init() {
      await this.loadDashboard();
      await this.loadRecordings();
      await this.checkApi();
      this.connectWebSocket();
      // Auto-refresh dashboard every 30s
      setInterval(() => {
        if (this.currentView === 'dashboard') this.loadDashboard();
      }, 30000);
    },

    connectWebSocket() {
      try {
        const ws = new WebSocket(`ws://${location.host}/ws/progress`);
        ws.onmessage = (event) => {
          const msg = JSON.parse(event.data);
          if (msg.type === 'progress') {
            // Update queue item progress
            const item = this.queue.find(q => q.jobId === msg.jobId);
            if (item) {
              item.progress = msg.progress;
              if (msg.status === 'done') { item.status = 'done'; this.loadRecordings(); }
              if (msg.status === 'failed') item.status = 'failed';
            }
            // Refresh dashboard
            this.loadDashboard();
          }
        };
        ws.onclose = () => { setTimeout(() => this.connectWebSocket(), 5000); };
      } catch {}
    },

    async loadDashboard() {
      try {
        const resp = await fetch('/api/analytics/overview');
        if (resp.ok) {
          const data = await resp.json();
          this.stats.totalRecordings = data.totalRecordings || 0;
          this.stats.totalHours = data.totalHours || 0;
          this.stats.totalUtterances = data.totalUtterances || 0;
          this.stats.uniqueSpeakers = data.uniqueSpeakers || 0;
        }
      } catch {}
      try {
        const resp = await fetch('/api/jobs?limit=10');
        if (resp.ok) {
          const data = await resp.json();
          this.recentJobs = data.jobs || [];
        }
      } catch {}
    },

    async loadRecordings() {
      try {
        const resp = await fetch('/api/recordings/');
        if (resp.ok) {
          const data = await resp.json();
          this.recordings = data.recordings || [];
          this.stats.totalRecordings = data.total || this.recordings.length;
        }
      } catch {}
    },

    async checkApi() {
      try {
        const resp = await fetch('/api/health');
        this.apiConnected = resp.ok;
      } catch {
        this.apiConnected = false;
      }
    },

    async doSearch() {
      if (!this.searchQuery.trim()) return;
      this.currentView = 'search';
      try {
        const resp = await fetch('/api/search/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: this.searchQuery }),
        });
        if (resp.ok) {
          const data = await resp.json();
          this.searchResults = data.results || [];
        }
      } catch {}
    },

    async saveSettings() {
      try {
        await fetch('/api/settings/api-keys', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            assemblyai: this.settings.assemblyaiKey,
            gemini: this.settings.geminiKey,
            openai: this.settings.openaiKey,
          }),
        });
        alert('設定を保存しました');
      } catch {}
    },

    selectFiles() {
      const input = document.createElement('input');
      input.type = 'file';
      input.multiple = true;
      input.accept = '.mp3,.wav,.m4a,.flac,.ogg,.aac,.mp4';
      input.onchange = (e) => this.addFiles(e.target.files);
      input.click();
    },

    handleDrop(event) {
      this.dragOver = false;
      this.addFiles(event.dataTransfer.files);
    },

    async addFiles(files) {
      for (const file of files) {
        const item = {
          id: crypto.randomUUID(),
          fileName: file.name,
          file: file,
          status: 'queued',
          progress: 0,
        };
        this.queue.push(item);
      }
    },

    async startAll() {
      for (const item of this.queue) {
        if (item.status !== 'queued') continue;
        item.status = 'running';
        try {
          const formData = new FormData();
          formData.append('file', item.file);
          const resp = await fetch('/api/recordings/upload', { method: 'POST', body: formData });
          if (resp.ok) {
            const data = await resp.json();
            item.status = 'done';
            item.recordingId = data.id;
            item.progress = 100;
            this.showToast(`${item.fileName} アップロード完了`, 'success');
          } else {
            item.status = 'failed';
            this.showToast(`${item.fileName} アップロード失敗`, 'error');
          }
        } catch (e) {
          item.status = 'failed';
          this.showToast(`${item.fileName} エラー`, 'error');
        }
      }
      await this.loadRecordings();
      await this.loadDashboard();
    },

    clearDone() {
      this.queue = this.queue.filter(item => item.status !== 'done');
    },

    async deleteRecording(id) {
      if (!confirm('この録音を削除しますか？')) return;
      try {
        const resp = await fetch(`/api/recordings/${id}`, { method: 'DELETE' });
        if (resp.ok) {
          this.recordings = this.recordings.filter(r => r.id !== id);
          await this.loadDashboard();
          this.showToast('録音を削除しました', 'success');
        } else {
          this.showToast('削除に失敗しました', 'error');
        }
      } catch {
        this.showToast('削除エラー', 'error');
      }
    },

    async viewTranscript(id) {
      this.currentView = 'transcript-detail';
      try {
        const resp = await fetch(`/api/recordings/${id}`);
        if (resp.ok) {
          const data = await resp.json();
          this.currentRecording = data.recording;
          this.currentUtterances = data.utterances || [];
        }
      } catch {}
    },

    async exportTranscript(type) {
      if (!this.currentRecording) return;
      try {
        const resp = await fetch('/api/exports/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            recording_id: this.currentRecording.id,
            export_type: type,
          }),
        });
        if (resp.ok) {
          const data = await resp.json();
          alert(`エクスポート完了: ${data.filePath}`);
        }
      } catch {}
    },

    formatDuration(sec) {
      if (!sec) return '';
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      return h > 0 ? `${h}h ${m}m` : `${m}m`;
    },

    msToTime(ms) {
      if (!ms) return '00:00:00';
      const total = Math.floor(ms / 1000);
      const h = Math.floor(total / 3600);
      const m = Math.floor((total % 3600) / 60);
      const s = total % 60;
      return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    },

    handleKeyboard(event) {
      // Skip if typing in an input
      if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA') return;

      // Cmd/Ctrl + K: Focus search
      if ((event.metaKey || event.ctrlKey) && event.key === 'k') {
        event.preventDefault();
        document.querySelector('input[placeholder="検索..."]')?.focus();
        return;
      }

      // Number keys for navigation
      const navMap = { '1': 'dashboard', '2': 'upload', '3': 'transcripts', '4': 'settings' };
      if (navMap[event.key] && !event.metaKey && !event.ctrlKey) {
        this.currentView = navMap[event.key];
      }

      // Escape: back to dashboard
      if (event.key === 'Escape') {
        if (this.currentView === 'transcript-detail') this.currentView = 'transcripts';
        else if (this.currentView === 'search') this.currentView = 'dashboard';
      }
    },

    showToast(message, type = 'info') {
      const id = crypto.randomUUID();
      this.toasts.push({ id, message, type });
      setTimeout(() => this.removeToast(id), 4000);
    },

    removeToast(id) {
      this.toasts = this.toasts.filter(t => t.id !== id);
    },
  };
}
</script>
</body>
</html>
