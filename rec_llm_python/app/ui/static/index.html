<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RecLLM</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { darkMode: 'class' }
</script>
<script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<style>
:root {
  --font-size-xs: 0.75rem;
  --font-size-sm: 0.875rem;
  --font-size-base: 1rem;
  --font-size-lg: 1.125rem;
  --font-size-xl: 1.25rem;
  --font-size-2xl: 1.5rem;
}
html[data-font="system"] { font-size: 100%; }
html[data-font="small"] { font-size: 87.5%; }
html[data-font="medium"] { font-size: 100%; }
html[data-font="large"] { font-size: 112.5%; }
html[data-font="xlarge"] { font-size: 125%; }
[x-cloak] { display: none !important; }
body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; font-size: var(--font-size-base); }
.fade-in { animation: fadeIn 0.2s ease-in; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
.toast-enter { animation: slideIn 0.3s ease-out; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.log-line { font-family: 'SF Mono', 'Fira Code', monospace; font-size: var(--font-size-xs); line-height: 1.6; }
.log-error { color: #dc2626; background: #fef2f2; }
.log-warning { color: #d97706; background: #fffbeb; }
.progress-bar { transition: width 0.3s ease; }
</style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen" x-data="app()" x-cloak @keydown.window="handleKeyboard($event)">

<!-- Sidebar -->
<div class="fixed inset-y-0 left-0 w-56 bg-white border-r border-gray-200 flex flex-col">
  <div class="p-4 border-b border-gray-100">
    <h1 class="text-lg font-bold text-gray-900">RecLLM</h1>
    <p class="text-xs text-gray-500">Audio Intelligence</p>
  </div>
  <nav class="flex-1 p-2 space-y-0.5">
    <template x-for="item in navItems" :key="item.id">
      <button @click="currentView = item.id"
        :class="currentView === item.id ? 'bg-blue-50 text-blue-700' : 'text-gray-600 hover:bg-gray-50'"
        class="w-full text-left px-3 py-2 rounded-md text-sm font-medium transition-colors"
        x-text="item.label"></button>
    </template>
  </nav>
  <div class="p-3 border-t border-gray-100">
    <div class="flex items-center gap-2">
      <div class="w-2 h-2 rounded-full" :class="apiConnected ? 'bg-emerald-500' : 'bg-red-500'"></div>
      <span class="text-xs text-gray-500" x-text="apiConnected ? t('apiConnected') : t('apiDisconnected')"></span>
    </div>
  </div>
</div>

<!-- Main Content -->
<div class="ml-56 min-h-screen">
  <!-- Header -->
  <header class="sticky top-0 z-10 bg-white/80 backdrop-blur border-b border-gray-200 px-6 py-3 flex items-center justify-between">
    <div>
      <h2 class="text-base font-semibold" x-text="navItems.find(n => n.id === currentView)?.label"></h2>
      <p class="text-xs text-gray-500" x-text="navItems.find(n => n.id === currentView)?.sub"></p>
    </div>
    <div class="flex items-center gap-3">
      <button @click="toggleDarkMode()" class="p-1.5 rounded-md hover:bg-gray-100 text-gray-500" :title="t('darkModeToggle')">
        <svg x-show="!darkMode" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
        <svg x-show="darkMode" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
      </button>
      <input type="text" :placeholder="t('searchPlaceholder')" class="text-sm border border-gray-200 rounded-md px-3 py-1.5 w-48 focus:outline-none focus:ring-1 focus:ring-blue-500"
        x-model="searchQuery" @keyup.enter="doSearch()">
    </div>
  </header>

  <!-- Dashboard -->
  <div x-show="currentView === 'dashboard'" class="p-6 fade-in">
    <div class="grid grid-cols-4 gap-4 mb-6">
      <div class="bg-white rounded-lg border border-gray-200 p-4">
        <div class="text-xs text-gray-500 mb-1" x-text="t('totalFiles')"></div>
        <div class="text-2xl font-bold" x-text="stats.totalRecordings"></div>
      </div>
      <div class="bg-white rounded-lg border border-gray-200 p-4">
        <div class="text-xs text-gray-500 mb-1" x-text="t('totalHours')"></div>
        <div class="text-2xl font-bold" x-text="stats.totalHours + 'h'"></div>
      </div>
      <div class="bg-white rounded-lg border border-gray-200 p-4">
        <div class="text-xs text-gray-500 mb-1" x-text="t('utterances')"></div>
        <div class="text-2xl font-bold" x-text="stats.totalUtterances.toLocaleString()"></div>
      </div>
      <div class="bg-white rounded-lg border border-gray-200 p-4">
        <div class="text-xs text-gray-500 mb-1" x-text="t('speakers')"></div>
        <div class="text-2xl font-bold" x-text="stats.uniqueSpeakers"></div>
      </div>
    </div>
    <div class="bg-white rounded-lg border border-gray-200 p-4">
      <h3 class="text-sm font-semibold mb-3" x-text="t('recentJobs')"></h3>
      <div x-show="recentJobs.length === 0" class="text-sm text-gray-400 py-4 text-center" x-text="t('noJobsYet')"></div>
      <div class="space-y-2">
        <template x-for="job in recentJobs" :key="job.id">
          <div class="flex items-center justify-between py-2 border-b border-gray-50 last:border-0">
            <div class="flex items-center gap-3">
              <div class="w-2 h-2 rounded-full" :class="job.status === 'done' ? 'bg-emerald-500' : job.status === 'failed' ? 'bg-red-500' : 'bg-amber-500'"></div>
              <span class="text-sm" x-text="job.recording_id"></span>
            </div>
            <span class="text-xs px-2 py-0.5 rounded-full"
              :class="job.status === 'done' ? 'bg-emerald-50 text-emerald-700' : job.status === 'failed' ? 'bg-red-50 text-red-700' : 'bg-amber-50 text-amber-700'"
              x-text="job.status === 'done' ? t('completed') : job.status === 'failed' ? t('failed') : t('processing')"></span>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- Upload -->
  <div x-show="currentView === 'upload'" class="p-6 fade-in">
    <div class="bg-white rounded-lg border border-gray-200 p-6">
      <div class="border-2 border-dashed border-gray-300 rounded-lg p-12 text-center hover:border-blue-400 transition-colors"
        @dragover.prevent="dragOver = true" @dragleave="dragOver = false" @drop.prevent="handleDrop($event)"
        :class="dragOver ? 'border-blue-400 bg-blue-50' : ''">
        <div class="text-gray-400 mb-2">
          <svg class="w-12 h-12 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
          </svg>
        </div>
        <p class="text-sm text-gray-600 mb-1" x-text="t('dragDrop')"></p>
        <p class="text-xs text-gray-400" x-text="t('fileFormats')"></p>
        <button @click="selectFiles()" class="mt-4 px-4 py-2 bg-blue-600 text-white text-sm rounded-md hover:bg-blue-700 transition-colors" x-text="t('selectFiles')"></button>
      </div>

      <!-- Queue -->
      <div x-show="queue.length > 0" class="mt-6">
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-sm font-semibold" x-text="t('processingQueue') + ' (' + queue.length + ')'"></h3>
          <div class="flex gap-2">
            <button @click="startAll()" class="text-xs px-3 py-1 bg-emerald-600 text-white rounded hover:bg-emerald-700" x-text="t('startAll')"></button>
            <button @click="clearDone()" class="text-xs px-3 py-1 bg-gray-200 text-gray-700 rounded hover:bg-gray-300" x-text="t('clearDone')"></button>
          </div>
        </div>
        <div class="space-y-2">
          <template x-for="item in queue" :key="item.id">
            <div class="bg-gray-50 rounded-lg p-3 relative overflow-hidden">
              <div class="flex items-center gap-3">
                <div class="w-2 h-2 rounded-full shrink-0" :class="item.status === 'done' ? 'bg-emerald-500' : item.status === 'failed' ? 'bg-red-500' : item.status === 'running' ? 'bg-blue-500 animate-pulse' : 'bg-gray-300'"></div>
                <span class="flex-1 text-sm truncate" x-text="item.fileName"></span>
                <span x-show="item.status === 'running'" class="text-xs text-blue-600" x-text="(item.progress || 0) + '%'"></span>
                <span class="text-xs px-2 py-0.5 rounded-full"
                  :class="item.status === 'done' ? 'bg-emerald-50 text-emerald-700' : item.status === 'failed' ? 'bg-red-50 text-red-700' : item.status === 'running' ? 'bg-blue-50 text-blue-700' : 'bg-gray-100 text-gray-600'"
                  x-text="item.step || (item.status === 'done' ? t('completed') : item.status === 'failed' ? t('failed') : item.status === 'running' ? t('processing') : t('waiting'))"></span>
                <button x-show="item.status === 'failed'" @click="retryQueueItem(item)" class="text-xs px-2 py-1 bg-amber-100 text-amber-700 rounded hover:bg-amber-200" x-text="t('retry')"></button>
                <button @click="removeQueueItem(item)" class="text-gray-400 hover:text-red-500 p-1" :title="t('remove')">
                  <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
              </div>
              <div x-show="item.status === 'running'" class="mt-2 h-1 bg-gray-200 rounded-full overflow-hidden">
                <div class="h-full bg-blue-500 progress-bar rounded-full" :style="'width:' + (item.progress || 0) + '%'"></div>
              </div>
              <div x-show="item.status === 'failed' && item.error" class="mt-2 text-xs text-red-600" x-text="item.error"></div>
            </div>
          </template>
        </div>
      </div>
    </div>
  </div>

  <!-- Transcripts -->
  <div x-show="currentView === 'transcripts'" class="p-6 fade-in">
    <div class="bg-white rounded-lg border border-gray-200">
      <div class="p-4 border-b border-gray-100">
        <input type="text" :placeholder="t('searchTranscripts')" class="text-sm border border-gray-200 rounded-md px-3 py-1.5 w-full focus:outline-none focus:ring-1 focus:ring-blue-500" x-model="transcriptSearch">
      </div>
      <div x-show="recordings.length === 0" class="p-12 text-center">
        <svg class="w-12 h-12 mx-auto text-gray-300 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        <p class="text-sm text-gray-400" x-text="t('noTranscripts')"></p>
      </div>
      <!-- Table header -->
      <div x-show="recordings.length > 0" class="grid grid-cols-12 gap-2 px-4 py-2 border-b border-gray-100 text-xs text-gray-500 font-medium">
        <div class="col-span-4" x-text="t('fileName')"></div>
        <div class="col-span-1" x-text="t('duration')"></div>
        <div class="col-span-1" x-text="t('language')"></div>
        <div class="col-span-1" x-text="t('speakersCol')"></div>
        <div class="col-span-2" x-text="t('date')"></div>
        <div class="col-span-1" x-text="t('status')"></div>
        <div class="col-span-2" x-text="t('actions')"></div>
      </div>
      <div class="divide-y divide-gray-50">
        <template x-for="rec in filteredRecordings" :key="rec.id">
          <div class="grid grid-cols-12 gap-2 px-4 py-3 hover:bg-gray-50 cursor-pointer transition-colors group items-center" @click="viewTranscript(rec.id)">
            <div class="col-span-4 text-sm font-medium truncate" x-text="rec.original_file_name || rec.id"></div>
            <div class="col-span-1 text-xs text-gray-500" x-text="formatDuration(rec.duration_seconds)"></div>
            <div class="col-span-1 text-xs text-gray-500" x-text="rec.language_code || 'auto'"></div>
            <div class="col-span-1 text-xs text-gray-500" x-text="rec.speaker_count || '-'"></div>
            <div class="col-span-2 text-xs text-gray-500" x-text="rec.created_at?.slice(0, 10)"></div>
            <div class="col-span-1">
              <span class="text-xs px-2 py-0.5 rounded-full"
                :class="rec.status === 'done' ? 'bg-emerald-50 text-emerald-700' : rec.status === 'failed' ? 'bg-red-50 text-red-700' : rec.status === 'processing' ? 'bg-blue-50 text-blue-700' : 'bg-gray-100 text-gray-600'"
                x-text="rec.status === 'done' ? t('completed') : rec.status === 'failed' ? t('failed') : rec.status === 'processing' ? t('processing') : t('waiting')"></span>
            </div>
            <div class="col-span-2 flex items-center gap-1">
              <button @click.stop="viewTranscript(rec.id)" class="text-xs px-2 py-1 bg-gray-100 rounded hover:bg-gray-200" x-text="t('open')"></button>
              <button @click.stop="exportSingle(rec.id, 'pdf')" class="text-xs px-2 py-1 bg-gray-100 rounded hover:bg-gray-200">PDF</button>
              <button @click.stop="deleteRecording(rec.id)" class="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-red-500 p-1">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
              </button>
            </div>
          </div>
        </template>
      </div>
    </div>
  </div>


  <!-- Settings -->
  <div x-show="currentView === 'settings'" class="p-6 fade-in">
    <div class="flex gap-6">
      <!-- Settings sidebar -->
      <div class="w-44 shrink-0">
        <nav class="space-y-1">
          <template x-for="tab in settingsTabs" :key="tab.id">
            <button @click="settingsTab = tab.id; if(tab.id === 'developer') loadDiagnostics()"
              :class="settingsTab === tab.id ? 'bg-blue-50 text-blue-700 font-medium' : 'text-gray-600 hover:bg-gray-50'"
              class="w-full text-left px-3 py-2 rounded-md text-sm transition-colors"
              x-text="tab.label"></button>
          </template>
        </nav>
      </div>
      <!-- Settings content -->
      <div class="flex-1 max-w-2xl space-y-5">

        <!-- General -->
        <div x-show="settingsTab === 'general'" class="space-y-5">
          <div class="bg-white rounded-lg border border-gray-200 p-5">
            <h3 class="text-sm font-semibold mb-1" x-text="t('displayLanguage')"></h3>
            <p class="text-xs text-gray-400 mb-3" x-text="t('displayLanguageHelp')"></p>
            <select x-model="lang" @change="setLanguage(lang)" class="text-sm border border-gray-200 rounded-md px-3 py-2">
              <option value="ja">日本語</option>
              <option value="en">English</option>
            </select>
          </div>
          <div class="bg-white rounded-lg border border-gray-200 p-5">
            <h3 class="text-sm font-semibold mb-1" x-text="t('fontSize')"></h3>
            <p class="text-xs text-gray-400 mb-3" x-text="t('fontSizeHelp')"></p>
            <select x-model="fontSizeMode" @change="applyFontSize()" class="text-sm border border-gray-200 rounded-md px-3 py-2">
              <option value="system" x-text="t('fontSystem')"></option>
              <option value="small" x-text="t('fontSmall')"></option>
              <option value="medium" x-text="t('fontMedium')"></option>
              <option value="large" x-text="t('fontLarge')"></option>
              <option value="xlarge" x-text="t('fontXLarge')"></option>
            </select>
            <div class="mt-3 p-3 bg-gray-50 rounded-lg border border-gray-100">
              <p class="text-gray-600" x-text="t('fontPreview')"></p>
            </div>
          </div>
          <div class="bg-white rounded-lg border border-gray-200 p-5">
            <h3 class="text-sm font-semibold mb-1" x-text="t('theme')"></h3>
            <p class="text-xs text-gray-400 mb-3" x-text="t('themeHelp')"></p>
            <select x-model="themeMode" @change="applyTheme()" class="text-sm border border-gray-200 rounded-md px-3 py-2">
              <option value="light" x-text="t('themeLight')"></option>
              <option value="dark" x-text="t('themeDark')"></option>
              <option value="system" x-text="t('themeSystem')"></option>
            </select>
          </div>
        </div>

        <!-- AI Providers -->
        <div x-show="settingsTab === 'providers'" class="space-y-5">
          <div class="bg-white rounded-lg border border-gray-200 p-5">
            <h3 class="text-sm font-semibold mb-1" x-text="t('aiProviders')"></h3>
            <p class="text-xs text-gray-400 mb-4" x-text="t('aiProvidersHelp')"></p>
            <div class="space-y-4">
              <template x-for="prov in ['assemblyai', 'gemini', 'openai']" :key="prov">
                <div class="border border-gray-100 rounded-lg p-4">
                  <div class="flex items-center justify-between mb-2">
                    <label class="text-sm font-medium" x-text="prov === 'assemblyai' ? 'AssemblyAI' : prov === 'gemini' ? 'Gemini' : 'OpenAI'"></label>
                    <div class="flex items-center gap-2">
                      <span class="text-xs px-2 py-0.5 rounded-full"
                        :class="providerStatus[prov] === 'ok' ? 'bg-emerald-50 text-emerald-700' : providerStatus[prov] === 'error' ? 'bg-red-50 text-red-700' : 'bg-gray-100 text-gray-500'"
                        x-text="providerStatus[prov] === 'ok' ? t('connected') : providerStatus[prov] === 'error' ? t('invalid') : t('missing')"></span>
                    </div>
                  </div>
                  <div class="flex gap-2">
                    <input :type="showKeys[prov] ? 'text' : 'password'"
                      x-model="settings[prov + 'Key']" :placeholder="t('enterApiKey')"
                      class="flex-1 text-sm border border-gray-200 rounded-md px-3 py-2 focus:outline-none focus:ring-1 focus:ring-blue-500">
                    <button @click="showKeys[prov] = !showKeys[prov]" class="px-2 text-gray-400 hover:text-gray-600" :title="showKeys[prov] ? 'Hide' : 'Show'">
                      <svg x-show="!showKeys[prov]" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                      <svg x-show="showKeys[prov]" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/></svg>
                    </button>
                    <button @click="testProvider(prov)" :disabled="providerTesting[prov]"
                      class="text-xs px-3 py-2 bg-gray-100 rounded-md hover:bg-gray-200 disabled:opacity-50"
                      x-text="providerTesting[prov] ? t('testing') : t('testConnection')"></button>
                  </div>
                </div>
              </template>
            </div>
            <button @click="saveSettings()" class="mt-4 px-4 py-2 bg-blue-600 text-white text-sm rounded-md hover:bg-blue-700" x-text="t('saveSettings')"></button>
          </div>
        </div>

        <!-- Processing -->
        <div x-show="settingsTab === 'processing'" class="space-y-5">
          <div class="bg-white rounded-lg border border-gray-200 p-5">
            <h3 class="text-sm font-semibold mb-4" x-text="t('processingSettings')"></h3>
            <div class="space-y-4">
              <label class="flex items-center gap-3">
                <input type="checkbox" x-model="settings.noiseReduction" class="rounded border-gray-300">
                <div>
                  <span class="text-sm" x-text="t('noiseReduction')"></span>
                  <p class="text-xs text-gray-400" x-text="t('noiseReductionHelp')"></p>
                </div>
              </label>
              <label class="flex items-center gap-3">
                <input type="checkbox" x-model="settings.speakerDetection" class="rounded border-gray-300">
                <div>
                  <span class="text-sm" x-text="t('speakerDetection')"></span>
                  <p class="text-xs text-gray-400" x-text="t('speakerDetectionHelp')"></p>
                </div>
              </label>
              <label class="flex items-center gap-3">
                <input type="checkbox" x-model="settings.autoStartQueue" class="rounded border-gray-300">
                <div>
                  <span class="text-sm" x-text="t('autoStartQueue')"></span>
                  <p class="text-xs text-gray-400" x-text="t('autoStartQueueHelp')"></p>
                </div>
              </label>
              <label class="flex items-center gap-3">
                <input type="checkbox" x-model="settings.keepOriginalFile" class="rounded border-gray-300">
                <div>
                  <span class="text-sm" x-text="t('keepOriginalFile')"></span>
                </div>
              </label>
              <div>
                <label class="text-xs text-gray-500 block mb-1" x-text="t('defaultLanguage')"></label>
                <select x-model="settings.language" class="text-sm border border-gray-200 rounded-md px-3 py-2">
                  <option value="auto" x-text="t('autoDetect')"></option>
                  <option value="ja">日本語</option>
                  <option value="en">English</option>
                </select>
              </div>
              <div>
                <label class="text-xs text-gray-500 block mb-1" x-text="t('maxParallelJobs')"></label>

          <template x-for="result in searchResults" :key="result.recording_id + result.matched_text">

              <div class="text-xs text-gray-500" x-text="result.file_name"></div>
              <div class="text-sm mt-1" x-text="result.matched_text"></div>
              <div class="text-xs text-gray-400 mt-1" x-text="(result.speaker || '') + ' · ' + (result.date?.slice(0, 10) || '')"></div>

          </template>
        </div>
      </div>
    </div>

      <div class="bg-white rounded-lg border border-gray-200 p-4">

                        <div class="flex justify-between"><span class="text-gray-500" x-text="t('speakingSpeed')"></span><span x-text="t(sp.speaking_speed)"></span></div>
                        <div class="flex justify-between"><span class="text-gray-500" x-text="t('talkPercentage')"></span><span x-text="sp.talk_percentage + '%'"></span></div>

                  </template>
                  <div class="flex justify-between"><span class="text-gray-500" x-text="t('confidence')"></span><span x-text="Math.round(vp.confidence * 100) + '%'"></span></div>

          </div>

                <span class="text-amber-600" x-text="'(' + t('overlapWarning') + ')'"></span>
              </div>

          <p class="text-[10px] text-gray-400 italic" x-text="t('voiceTypeNote')"></p>
        </div>
      </div>

      <div class="bg-white rounded-lg border border-gray-200 divide-y divide-gray-50">
        <template x-for="utt in currentUtterances" :key="utt.id">

            </div>
          </div>
        </template>
        <div x-show="currentUtterances.length === 0" class="p-8 text-center text-sm text-gray-400" x-text="t('noTranscriptData')"></div>

      <button @click="removeToast(toast.id)" class="text-white/70 hover:text-white">✕</button>

  </template>
</div>

function app() {
  return {
    currentView: 'dashboard',
    searchQuery: '',
    searchPerformed: false,
    transcriptSearch: '',
    dragOver: false,
    darkMode: localStorage.getItem('darkMode') === 'true',
    themeMode: localStorage.getItem('themeMode') || 'light',
    fontSizeMode: localStorage.getItem('recllm_fontsize') || 'system',
    lang: localStorage.getItem('recllm_lang') || 'ja',
    apiConnected: false,
    wsConnected: false,
    _pollInterval: null,
    stats: { totalRecordings: 0, totalHours: 0, totalUtterances: 0, uniqueSpeakers: 0 },
    recentJobs: [],
    recordings: [],
    queue: [],
    searchResults: [],
    currentRecording: null,
    currentUtterances: [],
    speakerAnalysis: null,
    speakerAnalysisLoading: false,
    toasts: [],
    settingsTab: 'general',
    diagnostics: null,
    diagLoading: false,
    logLines: [],
    logLevel: 'all',
    logLoading: false,
    healthResults: null,
    healthLoading: false,
    providerStatus: { assemblyai: null, gemini: null, openai: null },
    providerTesting: { assemblyai: false, gemini: false, openai: false },
    showKeys: { assemblyai: false, gemini: false, openai: false },
    settings: {
      assemblyaiKey: '',
      geminiKey: '',
      openaiKey: '',
      noiseReduction: false,
      speakerDetection: true,
      language: 'auto',
      autoStartQueue: true,
      keepOriginalFile: true,
      maxParallelJobs: '2',
      enableSpeakerIntelligence: true,
      enableVoiceType: true,
      enableVoiceCharacteristics: true,
      enableSpeedAnalysis: true,
      enableOverlapDetection: true,
      maxSpeakers: '10',
    },
    exportSettings: {
      includeSummary: true,
      includeTranscript: true,
      includeTimestamps: true,
      includeSpeakerLabels: true,
      includeKeyPoints: false,
      includeActionItems: false,
      pdfLanguage: 'ja',
    },

    t(key) { return I18N[this.lang]?.[key] || I18N.en[key] || key; },

    get navItems() {
      return [
        { id: 'dashboard', label: this.t('dashboard'), sub: this.t('dashboardSub') },
        { id: 'upload', label: this.t('upload'), sub: this.t('uploadSub') },
        { id: 'transcripts', label: this.t('transcripts'), sub: this.t('transcriptsSub') },
        { id: 'search', label: this.t('search'), sub: this.t('searchSub') },
        { id: 'settings', label: this.t('settings'), sub: this.t('settingsSub') },
      ];
    },

    get settingsTabs() {
      return [
        { id: 'general', label: this.t('general') },
        { id: 'providers', label: this.t('aiProviders') },
        { id: 'processing', label: this.t('processing') },
        { id: 'export', label: this.t('export') },
        { id: 'storage', label: this.t('storage') },
        { id: 'developer', label: this.t('developer') },
      ];
    },

    get filteredRecordings() {
      if (!this.transcriptSearch) return this.recordings;
      const q = this.transcriptSearch.toLowerCase();
      return this.recordings.filter(r =>
        (r.original_file_name || '').toLowerCase().includes(q) ||
        (r.language_code || '').toLowerCase().includes(q)
      );
    },

    async init() {
      try {
        const resp = await fetch('/api/settings/display_language');
        if (resp.ok) {
          const data = await resp.json();
          if (data.value && (data.value === 'ja' || data.value === 'en')) {
            this.lang = data.value;
            localStorage.setItem('recllm_lang', data.value);
          }
        }
      } catch {}
      document.documentElement.lang = this.lang;
      this.applyTheme();
      // Load font size from backend
      try {
        const fsResp = await fetch('/api/settings/font_size');
        if (fsResp.ok) {
          const fsData = await fsResp.json();
          if (fsData.value && ['system','small','medium','large','xlarge'].includes(fsData.value)) {
            this.fontSizeMode = fsData.value;
            localStorage.setItem('recllm_fontsize', fsData.value);
          }
        }
      } catch {}
      this.applyFontSize();
      await this.loadDashboard();
      await this.loadRecordings();
      await this.checkApi();
      this.connectWebSocket();
      setInterval(() => {
        if (this.currentView === 'dashboard') this.loadDashboard();
      }, 30000);
    },

    applyTheme() {
      localStorage.setItem('themeMode', this.themeMode);
      if (this.themeMode === 'dark') {
        document.documentElement.classList.add('dark');
        this.darkMode = true;
      } else if (this.themeMode === 'light') {
        document.documentElement.classList.remove('dark');
        this.darkMode = false;
      } else {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.classList.toggle('dark', prefersDark);
        this.darkMode = prefersDark;
      }
    },

    applyFontSize() {
      localStorage.setItem('recllm_fontsize', this.fontSizeMode);
      document.documentElement.setAttribute('data-font', this.fontSizeMode);
      fetch('/api/settings/', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key: 'font_size', value: this.fontSizeMode }),
      }).catch(() => {});
    },

    connectWebSocket() {
      try {
        const ws = new WebSocket(`ws://${location.host}/ws/progress`);
        ws.onopen = () => {
          this.wsConnected = true;
          if (this._pollInterval) { clearInterval(this._pollInterval); this._pollInterval = null; }
        };
        ws.onmessage = (event) => {
          const msg = JSON.parse(event.data);
          if (msg.type === 'progress') {
            const item = this.queue.find(q => q.jobId === msg.jobId);
            if (item) {
              item.progress = msg.progress;
              if (msg.status === 'done') { item.status = 'done'; this.loadRecordings(); }
              if (msg.status === 'failed') item.status = 'failed';
            }
            this.loadDashboard();
          }
        };
        ws.onclose = () => {
          this.wsConnected = false;
          this.startPolling();
          setTimeout(() => this.connectWebSocket(), 5000);
        };
        ws.onerror = () => { this.wsConnected = false; ws.close(); };
      } catch {
        this.wsConnected = false;
        this.startPolling();
        setTimeout(() => this.connectWebSocket(), 5000);
      }
    },

    startPolling() {
      if (this._pollInterval) return;
      this._pollInterval = setInterval(async () => {
        await this.loadDashboard();
        const hasRunning = this.queue.some(q => q.status === 'running');
        if (hasRunning) await this.loadRecordings();
      }, 3000);
    },

    async loadDashboard() {
      try {
        const resp = await fetch('/api/analytics/overview');
        if (resp.ok) {
          const data = await resp.json();
          this.stats.totalRecordings = data.totalRecordings || 0;
          this.stats.totalHours = data.totalHours || 0;
          this.stats.totalUtterances = data.totalUtterances || 0;
          this.stats.uniqueSpeakers = data.uniqueSpeakers || 0;
        }
      } catch {}
      try {
        const resp = await fetch('/api/jobs?limit=10');
        if (resp.ok) {
          const data = await resp.json();
          this.recentJobs = data.jobs || [];
        }
      } catch {}
    },

    async loadRecordings() {
      try {
        const resp = await fetch('/api/recordings/');
        if (resp.ok) {
          const data = await resp.json();
          this.recordings = data.recordings || [];
          this.stats.totalRecordings = data.total || this.recordings.length;
        }
      } catch {}
    },

    async checkApi() {
      try {
        const resp = await fetch('/api/health');
        this.apiConnected = resp.ok;
      } catch { this.apiConnected = false; }
    },

    async doSearch() {
      if (!this.searchQuery.trim()) return;
      this.currentView = 'search';
      this.searchPerformed = true;
      try {
        const resp = await fetch('/api/search/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: this.searchQuery }),
        });
        if (resp.ok) {
          const data = await resp.json();
          this.searchResults = data.results || [];
        }
      } catch {}
    },

    async saveSettings() {
      try {
        await fetch('/api/settings/api-keys', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            assemblyai: this.settings.assemblyaiKey,
            gemini: this.settings.geminiKey,
            openai: this.settings.openaiKey,
          }),
        });
        this.showToast(this.t('savedOk'), 'success');
      } catch {}
    },

    async saveProcessingSettings() {
      try {
        await fetch('/api/settings/', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: 'preferences', value: JSON.stringify({
            noise_reduction: this.settings.noiseReduction,
            speaker_detection: this.settings.speakerDetection,
            language_code: this.settings.language,
            auto_start_queue: this.settings.autoStartQueue,
            keep_original_file: this.settings.keepOriginalFile,
            max_parallel_jobs: parseInt(this.settings.maxParallelJobs),
          })}),
        });
        this.showToast(this.t('savedOk'), 'success');
      } catch {}
    },

    async saveExportSettings() {
      try {
        await fetch('/api/settings/', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key: 'export_settings', value: JSON.stringify(this.exportSettings) }),
        });
        this.showToast(this.t('savedOk'), 'success');
      } catch {}
    },

    async testProvider(name) {
      this.providerTesting[name] = true;
      try {
        const resp = await fetch('/api/settings/test-provider', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ provider: name }),
        });
        if (resp.ok) {
          const data = await resp.json();
          this.providerStatus[name] = data.status;
          this.showToast(`${name}: ${data.message}`, data.status === 'ok' ? 'success' : 'error');
        }
      } catch {
        this.providerStatus[name] = 'error';
      }
      this.providerTesting[name] = false;
    },

    async loadDiagnostics() {
      this.diagLoading = true;
      try {
        const resp = await fetch('/api/diagnostics');
        if (resp.ok) this.diagnostics = await resp.json();
      } catch {}
      this.diagLoading = false;
      this.loadLogs();
    },

    async loadLogs() {
      this.logLoading = true;
      try {
        const level = this.logLevel === 'all' ? '' : this.logLevel;
        const resp = await fetch(`/api/logs?limit=100${level ? '&level=' + level : ''}`);
        if (resp.ok) {
          const data = await resp.json();
          this.logLines = data.lines || [];
        }
      } catch {}
      this.logLoading = false;
    },

    async runHealthCheck() {
      this.healthLoading = true;
      try {
        const resp = await fetch('/api/diagnostics/run', { method: 'POST' });
        if (resp.ok) {
          const data = await resp.json();
          this.healthResults = data.results || [];
        }
      } catch {}
      this.healthLoading = false;
    },

    async copyDebugReport() {
      const d = this.diagnostics || {};
      const report = [
        `RecLLM Debug Report`,
        `Generated: ${new Date().toISOString()}`,
        `---`,
        `App Version: ${d.app_version || 'unknown'}`,
        `Python: ${d.python_version || 'unknown'}`,
        `Platform: ${d.platform || 'unknown'} (${d.architecture || ''})`,
        `FFmpeg: ${d.ffmpeg?.detected ? d.ffmpeg.path : 'NOT FOUND'}`,
        `Database: ${d.database?.connected ? 'Connected' : 'Error'}`,
        `DB Size: ${d.database?.size_mb || 0} MB`,
        `Recordings: ${d.database?.recordings || 0}`,
        `Utterances: ${d.database?.utterances || 0}`,
        `Jobs Total: ${d.database?.jobs_total || 0}`,
        `Jobs Active: ${d.database?.jobs_active || 0}`,
        `Jobs Failed: ${d.database?.jobs_failed || 0}`,
        `Disk Free: ${d.storage?.disk_free_gb || 0} GB`,
        `API Keys: AssemblyAI=${d.api_keys?.assemblyai || 'missing'}, Gemini=${d.api_keys?.gemini || 'missing'}, OpenAI=${d.api_keys?.openai || 'missing'}`,
        `---`,
        `Recent Errors:`,
        ...(d.last_errors || []),
      ].join('\n');
      try {
        await navigator.clipboard.writeText(report);
        this.showToast(this.t('copySuccess'), 'success');
      } catch {
        this.showToast(this.t('copyFailed'), 'error');
      }
    },

    async clearCache() {
      try {
        const resp = await fetch('/api/storage/clear-cache', { method: 'POST' });
        if (resp.ok) {
          const data = await resp.json();
          this.showToast(`Cache cleared (${data.cleared_files} files)`, 'success');
          this.loadDiagnostics();
        }
      } catch {}
    },

    openDataFolder() {
      const path = this.diagnostics?.storage?.data_dir || '';
      this.showToast(`Data folder: ${path}`, 'info');
    },

    selectFiles() {
      const input = document.createElement('input');
      input.type = 'file';
      input.multiple = true;
      input.accept = '.mp3,.wav,.m4a,.flac,.ogg,.aac,.mp4';
      input.onchange = (e) => this.addFiles(e.target.files);
      input.click();
    },

    handleDrop(event) {
      this.dragOver = false;
      this.addFiles(event.dataTransfer.files);
    },

    addFiles(files) {
      for (const file of files) {
        this.queue.push({
          id: crypto.randomUUID(),
          fileName: file.name,
          file: file,
          status: 'queued',
          progress: 0,
          step: null,
          error: null,
        });
      }
    },

    async startAll() {
      for (const item of this.queue) {
        if (item.status !== 'queued') continue;
        item.status = 'running';
        item.step = this.t('upload');
        item.progress = 10;
        try {
          const formData = new FormData();
          formData.append('file', item.file);
          item.step = this.t('processing');
          item.progress = 30;
          const resp = await fetch('/api/recordings/upload', { method: 'POST', body: formData });
          if (resp.ok) {
            const data = await resp.json();
            item.status = 'done';
            item.recordingId = data.id;
            item.jobId = data.job_id;
            item.progress = 100;
            item.step = this.t('completed');
            this.showToast(`${item.fileName} ${this.t('uploadComplete')}`, 'success');
          } else {
            const err = await resp.text();
            item.status = 'failed';
            item.error = err || this.t('uploadFailed');
            this.showToast(`${item.fileName} ${this.t('uploadFailed')}`, 'error');
          }
        } catch (e) {
          item.status = 'failed';
          item.error = e.message || this.t('uploadFailed');
          this.showToast(`${item.fileName} ${this.t('uploadFailed')}`, 'error');
        }
      }
      await this.loadRecordings();
      await this.loadDashboard();
    },

    retryQueueItem(item) {
      item.status = 'queued';
      item.progress = 0;
      item.step = null;
      item.error = null;
    },

    removeQueueItem(item) {
      this.queue = this.queue.filter(q => q.id !== item.id);
    },

    clearDone() {
      this.queue = this.queue.filter(item => item.status !== 'done');
    },

    async deleteRecording(id) {
      if (!confirm(this.t('deleteConfirm'))) return;
      try {
        const resp = await fetch(`/api/recordings/${id}`, { method: 'DELETE' });
        if (resp.ok) {
          this.recordings = this.recordings.filter(r => r.id !== id);
          await this.loadDashboard();
          this.showToast(this.t('deleted'), 'success');
        } else { this.showToast(this.t('deleteFailed'), 'error'); }
      } catch { this.showToast(this.t('deleteError'), 'error'); }
    },

    async viewTranscript(id) {
      this.currentView = 'transcript-detail';
      this.speakerAnalysis = null;
      try {
        const resp = await fetch(`/api/recordings/${id}`);
        if (resp.ok) {
          const data = await resp.json();
          this.currentRecording = data.recording;
          this.currentUtterances = data.utterances || [];
        }
      } catch {}
      this.loadSpeakerAnalysis(id);
    },

    async loadSpeakerAnalysis(id) {
      try {
        const resp = await fetch(`/api/recordings/${id}/speaker-analysis`);
        if (resp.ok) {
          const data = await resp.json();
          if (data.analyzed) this.speakerAnalysis = data;
        }
      } catch {}
    },

    async runSpeakerAnalysis() {
      if (!this.currentRecording) return;
      this.speakerAnalysisLoading = true;
      try {
        const resp = await fetch(`/api/recordings/${this.currentRecording.id}/analyze-speakers`, { method: 'POST' });
        if (resp.ok) {
          this.speakerAnalysis = await resp.json();
          this.showToast(this.t('analyzeSpeakers') + ' ✓', 'success');
        }
      } catch {}
      this.speakerAnalysisLoading = false;
    },

    async exportSingle(id, type) {
      try {
        const resp = await fetch('/api/exports/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ recording_id: id, export_type: type }),
        });
        if (resp.ok) this.showToast(this.t('exportComplete'), 'success');
      } catch {}
    },

    async copyTranscript() {
      if (!this.currentUtterances.length) return;
      const text = this.currentUtterances.map(u =>
        `[${this.msToTime(u.start_ms)}] ${u.speaker}: ${u.corrected_text || u.text}`
      ).join('\n');
      try {
        await navigator.clipboard.writeText(text);
        this.showToast(this.t('copySuccess'), 'success');
      } catch { this.showToast(this.t('copyFailed'), 'error'); }
    },

    async exportTranscript(type) {
      if (!this.currentRecording) return;
      try {
        const resp = await fetch('/api/exports/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ recording_id: this.currentRecording.id, export_type: type }),
        });
        if (resp.ok) {
          const data = await resp.json();
          this.showToast(`${this.t('exportComplete')}: ${data.filePath || ''}`, 'success');
        }
      } catch {}
    },

    formatDuration(sec) {
      if (!sec) return '-';
      const h = Math.floor(sec / 3600);
      const m = Math.floor((sec % 3600) / 60);
      return h > 0 ? `${h}h ${m}m` : `${m}m`;
    },

    msToTime(ms) {
      if (!ms) return '00:00:00';
      const total = Math.floor(ms / 1000);
      const h = Math.floor(total / 3600);
      const m = Math.floor((total % 3600) / 60);
      const s = total % 60;
      return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    },

    handleKeyboard(event) {
      if (event.target.tagName === 'INPUT' || event.target.tagName === 'TEXTAREA' || event.target.tagName === 'SELECT') return;
      if ((event.metaKey || event.ctrlKey) && event.key === 'k') {
        event.preventDefault();
        document.querySelector('header input[type="text"]')?.focus();
        return;
      }
      const navMap = { '1': 'dashboard', '2': 'upload', '3': 'transcripts', '4': 'settings' };
      if (navMap[event.key] && !event.metaKey && !event.ctrlKey) this.currentView = navMap[event.key];
      if (event.key === 'Escape') {
        if (this.currentView === 'transcript-detail') this.currentView = 'transcripts';
        else if (this.currentView === 'search') this.currentView = 'dashboard';
      }
    },

    showToast(message, type = 'info') {
      const id = crypto.randomUUID();
      this.toasts.push({ id, message, type });
      setTimeout(() => this.removeToast(id), 4000);
    },

    removeToast(id) {
      this.toasts = this.toasts.filter(t => t.id !== id);
    },

    toggleDarkMode() {
      this.themeMode = this.darkMode ? 'light' : 'dark';
      this.applyTheme();
    },

    setLanguage(newLang) {
      this.lang = newLang;
      localStorage.setItem('recllm_lang', newLang);
      document.documentElement.lang = newLang;
      fetch('/api/settings/', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key: 'display_language', value: newLang }),
      }).catch(() => {});
    },
  };
}
</script>
</body>
