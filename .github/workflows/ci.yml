name: RecLLM CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - run: npm run test

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rec_llm_python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0 libffi-dev libcairo2
      - run: pip install -r requirements.txt
      - run: pip install pytest pytest-asyncio httpx python-multipart
      - run: python -m pytest tests/ -v --ignore=tests/test_pipeline_integration.py
